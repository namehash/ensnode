services:
  prometheus:
    # Pinned for reproducible perf runs; update deliberately after validating a newer release.
    image: prom/prometheus:v2.55.1
    container_name: ensnode-prometheus
    # Bound to loopback: the stack ships anonymous admin + --web.enable-admin-api (required for
    # the `pnpm wipe` script) so must not be exposed on shared/remote hosts.
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
      - --web.enable-admin-api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    # Pinned for reproducible perf runs; update deliberately after validating a newer release.
    image: grafana/grafana:11.3.0
    container_name: ensnode-grafana
    # Bound to loopback: anonymous Admin role is enabled for zero-friction local editing.
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
