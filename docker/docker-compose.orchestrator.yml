# Minimal compose for CI integration tests.
# Provides only the infrastructure services needed by orchestrator.ts:
# devnet (local EVM) and ensdb (database).
#
# NOTE: no `container_name` is set here so testcontainers gives each container a project-prefixed
# name and runs do not collide with manually-started stacks (docker-compose.yml /
# docker-compose.devnet.yml) or with each other.
#
# NOTE: ensdb uses an ephemeral host port ("0:5432") to avoid colliding with any host-native
# postgres on a developer machine. Orchestrator.ts reads the bound port via testcontainers'
# getMappedPort().
services:
  devnet:
    extends:
      file: services/devnet.yml
      service: devnet

  ensdb:
    extends:
      file: services/ensdb.yml
      service: ensdb
    ports:
      - "0:5432"
    env_file:
      - path: envs/.env.docker.common
        required: true

volumes:
  ensdb_data:
    driver: local
