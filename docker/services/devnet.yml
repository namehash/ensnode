services:
  devnet:
    container_name: devnet
    image: ghcr.io/ensdomains/contracts-v2:main-53f1482
    # NOTE: we run devnet with a custom chainId of 31337 to disambiguate between mainnet and devnet
    # see packages/datasources/src/lib/chains.ts for additional context
    command: ./script/runDevnet.ts --testNames --chain 31337
    pull_policy: always
    ports:
      - "8545:8545"
    environment:
      ANVIL_IP_ADDR: "0.0.0.0"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "-s", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 1s
