services:
  devnet:
    container_name: devnet
    build:
      context: ../..
      dockerfile: packages/ens-test-kit/devnet/Dockerfile
    ports:
      - "8545:8545"
    environment:
      ANVIL_IP_ADDR: "0.0.0.0"
      SEED_SENTINEL_PATH: "/tmp/ens-test-kit-seeded"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/ens-test-kit-seeded && curl --fail -s http://localhost:8000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 1s
