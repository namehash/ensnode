services:
  ensindexer:
    extends:
      file: services/ensindexer.yml
      service: ensindexer
    environment:
      ENSINDEXER_SCHEMA_NAME: docker_ensindexer_v1
    depends_on:
      ensrainbow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - path: envs/.env.docker.common
        required: true
      # Copy envs/.env.docker.example to envs/.env.docker.local and configure
      - path: envs/.env.docker.local
        required: true

  ensapi:
    extends:
      file: services/ensapi.yml
      service: ensapi
    environment:
      ENSINDEXER_SCHEMA_NAME: docker_ensindexer_v1
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: envs/.env.docker.common
        required: true
      - path: envs/.env.docker.local
        required: true

  ensrainbow:
    extends:
      file: services/ensrainbow.yml
      service: ensrainbow
    env_file:
      - path: envs/.env.docker.common
        required: true
      - path: envs/.env.docker.local
        required: true

  ensadmin:
    extends:
      file: services/ensadmin.yml
      service: ensadmin
    depends_on:
      ensapi:
        condition: service_started
    env_file:
      - path: envs/.env.docker.common
        required: true
      - path: envs/.env.docker.local
        required: true

  postgres:
    extends:
      file: services/postgres.yml
      service: postgres
    env_file:
      - path: envs/.env.docker.common
        required: true

volumes:
  # Docker Compose requires volumes used by services to be declared in each
  # compose file that references them — they cannot be inherited via `extends`.
  postgres_data:
    driver: local
  ensrainbow_data:
    driver: local
