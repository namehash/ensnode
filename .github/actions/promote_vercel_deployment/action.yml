name: Promote Vercel Deployment
description: Promotes the Vercel production deployment whose commit SHA matches
  the active ENSIndexer image in the given ENSNode environment. Ensures exact
  version matching between the active ENSNode and the Vercel project.

inputs:
  vercel_team_slug:
    description: "Vercel team slug"
    required: true

  vercel_project_id:
    description: "Vercel project ID to promote"
    required: true

  vercel_token:
    description: "Vercel API token"
    required: true

  ensnode_environment:
    description: "ENSNode environment to target (green, blue, or yellow)"
    required: true

runs:
  using: composite
  steps:
    - name: Promote
      shell: bash
      env:
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
        VERCEL_TEAM_SLUG: ${{ inputs.vercel_team_slug }}
        VERCEL_TOKEN: ${{ inputs.vercel_token }}
        ENSNODE_ENVIRONMENT: ${{ inputs.ensnode_environment }}
      run: ${{ github.action_path }}/promote_vercel_deployment.sh
