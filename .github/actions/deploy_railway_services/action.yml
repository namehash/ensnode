name: Deploy Railway services
description: >-
  Update + redeploy a set of Railway service instances to one Docker image, in series.
  Services are processed in the order given; ENSRainbow-type services should be listed first.

inputs:
  railway_token:
    description: "Railway API token (Authorization: Bearer)"
    required: true

  environment_id:
    description: "Railway environment id the service instances belong to"
    required: true

  image:
    description: "Full ghcr image reference including tag (e.g. ghcr.io/namehash/ensnode/ensindexer:1.2.3)"
    required: true

  service_ids:
    description: "Newline-separated Railway service ids, applied IN ORDER (ENSRainbow-type first)"
    required: true

  project_id:
    description: "Railway project id (required when schema_var_name is set, for the variableUpsert)"
    required: false
    default: ""

  schema_var_name:
    description: >-
      Optional environment variable to upsert IN THE SAME MUTATION as the image update (e.g.
      SEPOLIA_ENSINDEXER_SCHEMA_NAME). Set this for ENSIndexer instances so the new image and its
      target schema name flip atomically — otherwise a stale image, redeployed by the variable
      change, initializes the versioned schema before the new image can. Applies to every listed
      service, so pass a single service id when using it.
    required: false
    default: ""

  schema_var_value:
    description: "Value for schema_var_name (e.g. sepoliaSchema1.17.0). Required when schema_var_name is set."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Update + redeploy service instances in order
      shell: bash
      env:
        RAILWAY_TOKEN: ${{ inputs.railway_token }}
        ENVIRONMENT_ID: ${{ inputs.environment_id }}
        DOCKER_IMAGE: ${{ inputs.image }}
        SERVICE_IDS: ${{ inputs.service_ids }}
        PROJECT_ID: ${{ inputs.project_id }}
        SCHEMA_VAR_NAME: ${{ inputs.schema_var_name }}
        SCHEMA_VAR_VALUE: ${{ inputs.schema_var_value }}
      run: |
        set -euo pipefail

        if [ -n "$SCHEMA_VAR_NAME" ] && [ -z "$PROJECT_ID" ]; then
          echo "project_id is required when schema_var_name is set" >&2
          exit 1
        fi

        # Railway's GraphQL endpoint returns HTTP 200 even when a mutation fails (the error lives in
        # the response body's top-level `errors` array), so --fail alone misses it. Fail loudly when
        # the body carries a GraphQL error.
        fail_on_graphql_error() {
          local resp=$1
          if printf '%s' "$resp" | jq -e '.errors' >/dev/null 2>&1; then
            echo "Railway GraphQL error: $resp" >&2
            exit 1
          fi
        }

        railway_graphql() {
          curl --request POST \
            --silent \
            --fail \
            --show-error \
            --url https://backboard.railway.app/graphql/v2 \
            --header 'Authorization: Bearer '"$RAILWAY_TOKEN" \
            --header 'Content-Type: application/json' \
            --data "$1"
        }

        update_service_image() {
          local environment_id=$1
          local service_id=$2
          local docker_image=$3
          local resp payload
          if [ -n "$SCHEMA_VAR_NAME" ]; then
            # Single mutation: set the image AND upsert the schema-name variable together, so the
            # redeploy below is the NEW image initializing the NEW schema (no stale-image window).
            echo "Updating service $service_id (image + $SCHEMA_VAR_NAME=$SCHEMA_VAR_VALUE)"
            payload="$(jq -n \
              --arg env "$environment_id" --arg sid "$service_id" --arg imageref "$docker_image" \
              --arg proj "$PROJECT_ID" --arg vn "$SCHEMA_VAR_NAME" --arg vv "$SCHEMA_VAR_VALUE" \
              '{query: "mutation($env: String, $sid: String!, $input: ServiceInstanceUpdateInput!, $proj: String!, $vn: String!, $vv: String!) { setImage: serviceInstanceUpdate(environmentId: $env, serviceId: $sid, input: $input) setSchema: variableUpsert(input: { projectId: $proj, environmentId: $env, name: $vn, value: $vv }) }",
                variables: { env: $env, sid: $sid, input: { source: { image: $imageref } }, proj: $proj, vn: $vn, vv: $vv }}')"
          else
            echo "Updating service $service_id"
            payload="$(jq -n \
              --arg env "$environment_id" --arg sid "$service_id" --arg imageref "$docker_image" \
              '{query: "mutation($env: String, $sid: String!, $input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(environmentId: $env, serviceId: $sid, input: $input) }",
                variables: { env: $env, sid: $sid, input: { source: { image: $imageref } }}}')"
          fi
          resp="$(railway_graphql "$payload")"
          fail_on_graphql_error "$resp"
          echo "Finished updating $service_id"
        }

        redeploy_service() {
          local environment_id=$1
          local service_id=$2
          echo "Redeploying $service_id"
          local resp
          resp="$(curl --request POST \
            --silent \
            --fail \
            --show-error \
            --url https://backboard.railway.app/graphql/v2 \
            --header 'Authorization: Bearer '"$RAILWAY_TOKEN" \
            --header 'Content-Type: application/json' \
            --data "{\"query\":\"mutation serviceInstanceDeploy(\$serviceId: String!, \$environmentId: String!) { serviceInstanceDeploy(serviceId: \$serviceId, environmentId: \$environmentId) }\",\"variables\":{\"environmentId\":\"${environment_id}\",\"serviceId\":\"${service_id}\"}}")"
          fail_on_graphql_error "$resp"
          echo "Finished redeploying $service_id"
        }

        # Process each service id in order: update its image, then redeploy it.
        while IFS= read -r service_id; do
          [ -n "$service_id" ] || continue
          update_service_image "$ENVIRONMENT_ID" "$service_id" "$DOCKER_IMAGE"
          redeploy_service "$ENVIRONMENT_ID" "$service_id"
        done <<< "$SERVICE_IDS"
