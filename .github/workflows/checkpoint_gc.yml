name: "[next] Garbage Collector: terminate orphaned ENSIndexer checkpoint Cherry boxes"

# Safety net (the third box-teardown guard, alongside the workflow's always() teardown and the on-box
# self-destruct watchdog): terminate ORPHANED Cherry servers named `ensindexer-checkpoint-*`, in case a
# runner died before tearing its box down. Only ever touches checkpoint boxes — never Railway/production.
#
# Two-tier "orphaned" test (a fixed age alone is a bad proxy — it once reaped a box mid-index):
#   1. PRIMARY — if ANY checkpoint workflow run is active (in_progress/queued), a box may legitimately
#      belong to it, so skip reaping entirely. This is what keeps a live multi-hour index safe.
#   2. BACKSTOP — only when NO run is active, collect boxes older than MAX_AGE_HOURS. This catches the
#      true-leak case (dead runner AND failed self-destruct) without racing a live run. The age floor
#      also spares a box in the brief gap between a runner death and the re-dispatch that RE-ATTACHES to
#      it (during that gap no run is in_progress, but the box is young).

on:
  schedule:
    - cron: "17 * * * *" # hourly
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read # read run status of the checkpoint workflows (the primary orphaned-box test)

concurrency:
  group: checkpoint-gc
  cancel-in-progress: false

jobs:
  collect:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 15
    env:
      CHERRY_API_TOKEN: ${{ secrets.CHERRY_API_TOKEN }}
      CHERRY_PROJECT_ID: ${{ secrets.CHERRY_PROJECT_ID }}
      GH_TOKEN: ${{ github.token }} # for `gh run list` (the active-run guard)
      BOX_HOSTNAME_PREFIX: ensindexer-checkpoint
      # Space-separated checkpoint workflows that provision boxes; an active run of any of these spares
      # every checkpoint box this cycle (the primary orphaned-box test above).
      CHECKPOINT_WORKFLOWS: "index_checkpoint_and_deploy.yml checkpoint.yml"
      # Backstop age, applied ONLY when no checkpoint run is active. Sits strictly above a box's own
      # self-destruct watchdog (config.example.sh SELF_DESTRUCT_HOURS=25), so the age tier only ever
      # collects genuinely leaked boxes (dead runner AND failed self-destruct).
      # Invariant: MAX_AGE_HOURS > SELF_DESTRUCT_HOURS > longest expected index (~14-20h).
      MAX_AGE_HOURS: "28"
    steps:
      - name: Terminate stale checkpoint boxes
        run: |
          set -euo pipefail
          API=https://api.cherryservers.com/v1
          now=$(date +%s)

          # ── PRIMARY test: never reap while a checkpoint workflow run is active ──────────────────────
          # A running/queued checkpoint workflow may own any of the boxes (including one it is about to
          # re-attach to), so if ANY is active we skip this whole cycle. gh failing (API blip) must NOT
          # let us fall through to deleting boxes — treat an errored count as "active" (fail safe).
          active=0
          for wf in $CHECKPOINT_WORKFLOWS; do
            for st in in_progress queued; do
              if n="$(gh run list --workflow "$wf" --status "$st" --json databaseId --jq 'length' 2>/dev/null)"; then
                active=$((active + n))
              else
                echo "warn: could not read $wf/$st runs; treating as active (fail-safe)" >&2
                active=$((active + 1))
              fi
            done
          done
          if [ "$active" -gt 0 ]; then
            echo "checkpoint workflow run(s) active ($active) — skipping GC (a box may belong to a live run)"
            exit 0
          fi
          echo "no active checkpoint workflow runs — applying ${MAX_AGE_HOURS}h age backstop"

          # Retry the list call with backoff: Cherry's API returns transient 5xx, and a single one
          # shouldn't fail the GC (a `-fsS` death on one 500 is what previously broke a run). Only fail
          # after exhausting retries, so a *persistent* outage still surfaces rather than masking a leak.
          servers=""
          for attempt in 1 2 3 4 5; do
            if servers="$(curl -fsS -H "Authorization: Bearer $CHERRY_API_TOKEN" "$API/projects/$CHERRY_PROJECT_ID/servers")"; then
              break
            fi
            echo "list servers attempt $attempt failed; retrying in $((attempt * 10))s" >&2
            sleep "$((attempt * 10))"
            servers=""
          done
          [ -n "$servers" ] || { echo "could not list Cherry servers after retries" >&2; exit 1; }
          echo "$servers" | jq -c '.[]?' | while read -r s; do
            id="$(echo "$s" | jq -r '.id')"
            host="$(echo "$s" | jq -r '.hostname // ""')"
            # Cherry response shape varies; try common created-time fields.
            created="$(echo "$s" | jq -r '.created // .created_at // .deployed_at // ""')"
            case "$host" in
              "$BOX_HOSTNAME_PREFIX"*) ;;
              *) continue ;;
            esac
            cts="$(date -d "$created" +%s 2>/dev/null || echo 0)"
            [ "$cts" -gt 0 ] || { echo "skip $id ($host): unparseable created '$created'"; continue; }
            age=$(( (now - cts) / 3600 ))
            if [ "$age" -ge "$MAX_AGE_HOURS" ]; then
              echo "collecting server $id ($host, ${age}h old)"
              for attempt in 1 2 3; do
                curl -fsS -H "Authorization: Bearer $CHERRY_API_TOKEN" -X DELETE "$API/servers/$id" && break
                echo "delete $id attempt $attempt failed; retrying in $((attempt * 5))s" >&2
                sleep "$((attempt * 5))"
              done
            else
              echo "keep server $id ($host, ${age}h old)"
            fi
          done
